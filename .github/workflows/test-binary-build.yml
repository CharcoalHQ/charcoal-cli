name: Test binary build

on:
  push:
    branches: [install-deps-before-binary-build]
  workflow_dispatch:

jobs:
  build-binaries:
    name: Build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: charcoal-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: charcoal-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: charcoal-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: charcoal-darwin-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build src/index.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
